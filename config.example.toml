# ══════════════════════════════════════════════════════════════
# NAT Punchthrough Hero — Server Configuration
# ══════════════════════════════════════════════════════════════
#
# Copy this file to config.toml and edit as needed.
# Or run: ./server setup (interactive wizard)
#
# Priority: CLI flags > Environment variables > config.toml > Defaults
# All values shown here are defaults — uncomment and change as needed.
#

# ── Server ─────────────────────────────────────────────────────
# Port for the REST API and WebSocket signaling.
port = 8080

# Your server's public IP. "auto" = detect automatically at startup.
# Set manually if auto-detection fails or you're behind a load balancer.
external_ip = "auto"

# ── Domain & TLS (optional) ────────────────────────────────────
# Set this to enable HTTPS with automatic Let's Encrypt certificates.
# Requires: DNS A record pointing to this server + ports 80 & 443 open.
# Leave empty for HTTP-only (local/LAN or IP-based access).
# domain = "game.example.com"

# Or provide your own TLS certificate files (disables Let's Encrypt):
# tls_cert_file = "/path/to/cert.pem"
# tls_key_file  = "/path/to/key.pem"

# ── TURN Relay ─────────────────────────────────────────────────
# Shared secret for TURN credential generation (HMAC-SHA1).
# Auto-generated if empty. Must match coturn's static-auth-secret.
# turn_secret = ""

# TURN server address. "auto" = same as external_ip.
turn_host = "auto"
turn_port = 3478

# UDP port range for TURN relay. Keep narrow to simplify firewall rules.
# 1024 ports supports ~500 concurrent relay sessions.
turn_relay_min = 49152
turn_relay_max = 50175

# Max simultaneous TURN relay allocations (coturn --total-quota).
turn_quota = 300

# TURN credential lifetime in seconds. Shorter = more secure.
# Clients must reconnect when credentials expire.
turn_credential_ttl = 3600  # 1 hour

# ── Dashboard ──────────────────────────────────────────────────
# Password for the /admin dashboard (HTTP Basic Auth).
# Auto-generated if empty (printed to stdout on first run).
# admin_password = ""

# Dashboard access control:
#   "auto"   = "local" if no domain, "public" if domain is set
#   "local"  = only accessible via 127.0.0.1 (SSH tunnel for remote)
#   "public" = accessible from any IP (only safe with HTTPS)
dashboard_access = "auto"

# ── Security ───────────────────────────────────────────────────
# API key that game clients must include in X-API-Key header.
# Auto-generated if empty. Include this in your Unity build config.
# game_api_key = ""

# ── Rate Limits ────────────────────────────────────────────────
[rate_limit]
# Master switch for all rate limiting.
enabled = true

# Max new connections/sec server-wide (DDoS protection).
global_rps = 100

# HTTP requests per minute per IP.
per_ip_rpm = 60

# Max concurrent HTTP requests per IP (Slowloris protection).
per_ip_burst = 10

# WebSocket connections per minute per IP.
ws_per_ip_rpm = 5

# Max concurrent WebSocket connections per IP.
ws_per_ip_max = 3

# Game registrations per IP per hour (spam protection).
games_per_ip_rph = 100

# Join requests per minute per IP.
joins_per_ip_rpm = 200

# TURN credential requests per IP per hour.
turn_per_ip_rph = 10

# ── IP Access Control ──────────────────────────────────────────
[ip_filter]
# "blocklist" = block listed IPs, allow everything else (default)
# "allowlist" = only allow listed IPs (private server mode)
# "off"       = no IP filtering
mode = "blocklist"

# Supports individual IPs, CIDR ranges, and file references.
# File format: one IP/CIDR per line, # comments allowed.
# Changes take effect on SIGHUP or admin API /admin/api/reload.
blocklist = [
  # "1.2.3.4",
  # "10.0.0.0/8",
  # "file:///app/blocklist.txt",
]

allowlist = [
  # "192.168.1.0/24",
  # "file:///app/allowlist.txt",
]

# ── Automatic Protection ───────────────────────────────────────
[protection]
# Master switch for automatic abuse detection.
enabled = true

# Auto-block IPs that exceed rate limits repeatedly.
auto_block = true

# Number of rate limit violations before auto-blocking.
auto_block_threshold = 5

# Duration of the first auto-block.
auto_block_duration = "1h"

# Double the block duration on each repeat offense (up to 24h).
auto_block_escalation = true

# Flood detection: block IP if it opens this many connections
# within the flood window.
flood_connections = 50
flood_window = "10s"
flood_block_duration = "1h"

# Slow request (Slowloris) detection.
slow_request_timeout = "10s"
slow_request_max = 5

# Maximum request body size (bytes). Rejects larger payloads.
max_request_body = 16384    # 16KB

# Maximum WebSocket message size (bytes).
max_ws_message = 4096       # 4KB

# Log blocked IPs and violations to stdout.
log_blocked = true

# ── Limits ─────────────────────────────────────────────────────
# Maximum concurrent hosted games.
max_games = 500

# Seconds without heartbeat before a game is removed.
game_timeout = 30

# ── Network ────────────────────────────────────────────────────
# If behind a reverse proxy (Cloudflare, nginx, traefik), list trusted
# proxy IPs/CIDRs so the server reads X-Forwarded-For correctly.
# LEAVE EMPTY if NOT behind a proxy — prevents IP spoofing attacks.
trusted_proxies = [
  # "172.18.0.0/16",
  # "10.0.0.0/8",
]

# Restrict WebSocket Origin header (optional).
# Empty = allow all origins.
# allowed_origins = ["https://yourgame.com"]
